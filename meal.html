<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4-Week Lean Bulk Meal Plan</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--green:#2d6a4f;--green2:#40916c;--green3:#52b788;--pale:#d8f3dc;--cream:#fff8f0;--orange:#e76f51;--blue:#264653;--sunday:#fff3e0;--gray:#f5f5f5;--border:#e0e0e0;--text:#1b4332;--textlight:#555}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#f0f4f0;color:var(--text);line-height:1.5}
.container{max-width:1300px;margin:0 auto;padding:16px}
header{background:linear-gradient(135deg,var(--green),var(--green2));color:#fff;padding:28px 32px;border-radius:16px;margin-bottom:20px;text-align:center}
header h1{font-size:1.8em;margin-bottom:6px;letter-spacing:-0.5px}
header p{opacity:.85;font-size:.95em}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.stat{background:#fff;border-radius:12px;padding:16px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.stat .val{font-size:1.6em;font-weight:700;color:var(--green)}
.stat .val.prot{color:var(--blue)}.stat .val.carb{color:var(--green3)}.stat .val.fat{color:var(--orange)}
.stat .label{font-size:.78em;color:var(--textlight);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:10px 20px;border-radius:10px;cursor:pointer;font-weight:600;font-size:.9em;border:2px solid var(--border);background:#fff;transition:all .2s}
.tab:hover{border-color:var(--green3);background:var(--pale)}
.tab.active{background:var(--green);color:#fff;border-color:var(--green)}
.sub-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.sub-tab{padding:7px 16px;border-radius:8px;cursor:pointer;font-size:.85em;border:1px solid var(--border);background:#fff;transition:all .2s}
.sub-tab:hover{background:var(--pale)}
.sub-tab.active{background:var(--green2);color:#fff;border-color:var(--green2)}
.sub-tab.sunday{border-color:var(--orange)}
.sub-tab.sunday.active{background:var(--orange)}
.view-toggle{display:flex;gap:6px;margin-bottom:16px}
.vt-btn{padding:8px 18px;border-radius:8px;cursor:pointer;font-size:.85em;font-weight:600;border:2px solid var(--border);background:#fff;transition:all .2s}
.vt-btn:hover{border-color:var(--green3)}
.vt-btn.active{background:var(--green);color:#fff;border-color:var(--green)}
.day-card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:16px}
.day-card.sunday{border:2px solid var(--orange)}
.day-header{padding:14px 20px;font-weight:700;font-size:1.05em;display:flex;justify-content:space-between;align-items:center}
.day-header.sun{background:var(--sunday);color:var(--orange)}
.day-header:not(.sun){background:var(--pale);color:var(--green)}
.day-totals{font-size:.8em;font-weight:500;display:flex;gap:12px}
.day-totals span{padding:3px 8px;border-radius:6px;background:rgba(255,255,255,.7)}
.meal-row{display:grid;grid-template-columns:100px 1fr 200px;gap:0;border-bottom:1px solid var(--border);transition:background .15s}
.meal-row:hover{background:var(--gray)}
.meal-row:last-child{border-bottom:none}
.meal-label{padding:14px 16px;font-weight:700;font-size:.82em;text-transform:uppercase;letter-spacing:.5px;color:var(--green2);display:flex;align-items:center;border-right:1px solid var(--border)}
.meal-content{padding:14px 18px}
.meal-name{font-weight:700;font-size:.95em;margin-bottom:4px;color:var(--text)}
.meal-ingredients{font-size:.82em;color:var(--textlight);margin-bottom:6px}
.meal-meta{display:flex;gap:8px;flex-wrap:wrap;font-size:.78em}
.meal-meta .tag{padding:2px 8px;border-radius:5px;background:var(--pale);color:var(--green)}
.meal-meta .cook{background:#e8f4f8;color:var(--blue)}
.meal-macros{padding:14px 16px;display:flex;flex-direction:column;justify-content:center;gap:4px;border-left:1px solid var(--border);font-size:.82em}
.macro-row{display:flex;justify-content:space-between;align-items:center}
.macro-row .k{font-weight:700;color:var(--green)}
.macro-row .p{color:var(--blue)}.macro-row .c{color:var(--green3)}.macro-row .f{color:var(--orange)}
.prep-note{font-size:.78em;color:var(--textlight);font-style:italic;margin-top:4px}
/* Grocery */
.grocery-section{background:#fff;border-radius:14px;padding:20px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.grocery-section h3{font-size:1em;color:var(--green);margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--pale)}
.grocery-item{display:flex;align-items:center;padding:8px 4px;border-bottom:1px solid #f0f0f0;font-size:.88em;gap:10px}
.grocery-item:last-child{border-bottom:none}
.grocery-item input[type=checkbox]{width:18px;height:18px;accent-color:var(--green);cursor:pointer}
.grocery-item.checked{opacity:.45;text-decoration:line-through}
.grocery-item .qty{color:var(--green2);font-weight:600;min-width:80px;text-align:right}
.grocery-item .name{flex:1}
/* Meal Prep */
.prep-section{background:#fff;border-radius:14px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:16px}
.prep-section h3{font-size:1.05em;color:var(--green);margin-bottom:4px}
.prep-section .subtitle{font-size:.82em;color:var(--textlight);margin-bottom:14px;font-style:italic}
.prep-step{display:flex;gap:12px;padding:10px 4px;border-bottom:1px solid #f0f0f0;font-size:.88em;align-items:flex-start}
.prep-step:last-child{border-bottom:none}
.prep-step .num{background:var(--green);color:#fff;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8em;flex-shrink:0}
.prep-step input[type=checkbox]{width:18px;height:18px;accent-color:var(--green);cursor:pointer;margin-top:3px;flex-shrink:0}
.prep-step.checked{opacity:.45;text-decoration:line-through}
.hidden{display:none}
.easy-badge{background:var(--orange);color:#fff;font-size:.7em;padding:2px 8px;border-radius:5px;font-weight:600;margin-left:8px}
@media(max-width:768px){
.meal-row{grid-template-columns:1fr;}.meal-label{border-right:none;border-bottom:1px solid var(--border);padding:8px 16px}
.meal-macros{border-left:none;border-top:1px solid var(--border);flex-direction:row;flex-wrap:wrap;gap:10px;padding:10px 16px}
.stats{grid-template-columns:repeat(2,1fr)}.day-totals{flex-wrap:wrap;gap:6px}
}
</style>
</head>

let currentWeek="Week 1", currentDay="All", currentView="meals";
const weekKeys=Object.keys(weeks);

function calcDayTotals(dayMeals){
  let t={kcal:0,p:0,c:0,f:0};
  dayMeals.forEach(m=>{t.kcal+=m[2];t.p+=m[3];t.c+=m[4];t.f+=m[5]});
  return t;
}

function calcWeekAvg(wk){
  let days=weeks[wk];
  let totals=days.map(d=>calcDayTotals(d));
  let n=totals.length;
  return {
    kcal:Math.round(totals.reduce((s,t)=>s+t.kcal,0)/n),
    p:Math.round(totals.reduce((s,t)=>s+t.p,0)/n),
    c:Math.round(totals.reduce((s,t)=>s+t.c,0)/n),
    f:Math.round(totals.reduce((s,t)=>s+t.f,0)/n)
  };
}

function renderStats(){
  let a=calcWeekAvg(currentWeek);
  document.getElementById("weekStats").innerHTML=`
    <div class="stat"><div class="val">${a.kcal}</div><div class="label">Avg Daily Kcal</div></div>
    <div class="stat"><div class="val prot">${a.p}g</div><div class="label">Avg Protein</div></div>
    <div class="stat"><div class="val carb">${a.c}g</div><div class="label">Avg Carbs</div></div>
    <div class="stat"><div class="val fat">${a.f}g</div><div class="label">Avg Fat</div></div>
  `;
}

function renderWeekTabs(){
  document.getElementById("weekTabs").innerHTML=weekKeys.map(w=>
    `<div class="tab ${w===currentWeek?'active':''}" onclick="selectWeek('${w}')">${w}</div>`
  ).join("");
}

function renderDayTabs(){
  if(currentView!=="meals"){document.getElementById("dayTabs").innerHTML="";return;}
  let html=`<div class="sub-tab ${currentDay==='All'?'active':''}" onclick="selectDay('All')">All Days</div>`;
  DAYS.forEach(d=>{
    let cls=d==="Sunday"?"sunday":"";
    html+=`<div class="sub-tab ${cls} ${currentDay===d?'active':''}" onclick="selectDay('${d}')">${d}</div>`;
  });
  document.getElementById("dayTabs").innerHTML=html;
}

function renderMeals(){
  let wkData=weeks[currentWeek];
  let html="";
  wkData.forEach((dayMeals,di)=>{
    let day=DAYS[di];
    if(currentDay!=="All"&&currentDay!==day)return;
    let t=calcDayTotals(dayMeals);
    let isSun=day==="Sunday";
    html+=`<div class="day-card ${isSun?'sunday':''}">`;
    html+=`<div class="day-header ${isSun?'sun':''}">${day}${isSun?'<span class="easy-badge">Easy Day</span>':''}
      <div class="day-totals">
        <span><b>${t.kcal}</b> kcal</span>
        <span style="color:var(--blue)"><b>${t.p}g</b> protein</span>
        <span style="color:var(--green3)"><b>${t.c}g</b> carbs</span>
        <span style="color:var(--orange)"><b>${t.f}g</b> fat</span>
      </div></div>`;
    dayMeals.forEach((m,mi)=>{
      html+=`<div class="meal-row">
        <div class="meal-label">${MEALS[mi]}</div>
        <div class="meal-content">
          <div class="meal-name">${m[0]}</div>
          <div class="meal-ingredients">${m[1]}</div>
          <div class="meal-meta">
            <span class="tag cook">${m[6]}</span>
          </div>
          <div class="prep-note">${m[7]}</div>
        </div>
        <div class="meal-macros">
          <div class="macro-row"><span>Kcal</span><span class="k">${m[2]}</span></div>
          <div class="macro-row"><span>Protein</span><span class="p">${m[3]}g</span></div>
          <div class="macro-row"><span>Carbs</span><span class="c">${m[4]}g</span></div>
          <div class="macro-row"><span>Fat</span><span class="f">${m[5]}g</span></div>
        </div>
      </div>`;
    });
    html+=`</div>`;
  });
  document.getElementById("content").innerHTML=html;
}

function renderGrocery(){
  let g=groceries[currentWeek];
  let html="";
  let wkKey=currentWeek.replace(" ","");
  Object.entries(g).forEach(([cat,items])=>{
    html+=`<div class="grocery-section"><h3>${cat}</h3>`;
    items.forEach(([name,qty],i)=>{
      let id=`${wkKey}_${cat}_${i}`;
      let checked=localStorage.getItem(id)==="1";
      html+=`<div class="grocery-item ${checked?'checked':''}" id="gi_${id}">
        <input type="checkbox" ${checked?'checked':''} onchange="toggleGrocery('${id}',this)">
        <span class="name">${name}</span>
        <span class="qty">${qty}</span>
      </div>`;
    });
    html+=`</div>`;
  });
  document.getElementById("content").innerHTML=html;
}

function renderPrep(){
  let steps=mealPrep[currentWeek];
  let wkKey=currentWeek.replace(" ","");
  let html=`<div class="prep-section"><h3>Sunday Meal Prep - ${currentWeek}</h3>
    <div class="subtitle">Do these Sunday afternoon to set up your week (~90 min total)</div>`;
  steps.forEach((s,i)=>{
    let id=`prep_${wkKey}_${i}`;
    let checked=localStorage.getItem(id)==="1";
    html+=`<div class="prep-step ${checked?'checked':''}" id="ps_${id}">
      <div class="num">${i+1}</div>
      <input type="checkbox" ${checked?'checked':''} onchange="togglePrep('${id}',this)">
      <span>${s}</span>
    </div>`;
  });
  html+=`</div>`;
  document.getElementById("content").innerHTML=html;
}

function toggleGrocery(id,el){
  localStorage.setItem(id,el.checked?"1":"0");
  document.getElementById("gi_"+id).classList.toggle("checked",el.checked);
}
function togglePrep(id,el){
  localStorage.setItem(id,el.checked?"1":"0");
  document.getElementById("ps_"+id).classList.toggle("checked",el.checked);
}

function selectWeek(w){currentWeek=w;renderAll();}
function selectDay(d){currentDay=d;renderDayTabs();renderContent();}
function setView(v){
  currentView=v;
  document.querySelectorAll(".vt-btn").forEach(b=>b.classList.remove("active"));
  document.querySelectorAll(".vt-btn").forEach(b=>{if(b.textContent.toLowerCase().includes(v))b.classList.add("active")});
  renderDayTabs();renderContent();
}
function renderContent(){
  if(currentView==="meals")renderMeals();
  else if(currentView==="grocery")renderGrocery();
  else renderPrep();
}
function renderAll(){renderStats();renderWeekTabs();renderDayTabs();renderContent();}
renderAll();
</script>
